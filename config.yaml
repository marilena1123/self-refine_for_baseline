api:
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"  # name of env var containing your API key

model:
  engine: "google/gemini-2.0-flash-001"  # any OpenRouter model ID
  temperature: 0.7
  max_tokens: 512

task:
  name: "bbh_object_counting"  # task to run
  # data_file: "data/tasks/bbh_object_counting/data.jsonl"  # auto-derived from name if omitted
  max_attempts: 4
  feedback_type: "rich"
  outfile: "outputs/results.jsonl"
